name: Deploy D.A.I.S.Y. to Cloudflare Pages

on:
  push:
    branches:
      - main # Or whichever branch you deploy from

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend SPA
        # Running Vite directly to bypass the server.ts esbuild step
        run: npx vite build 

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: daisy # Replace with your Cloudflare project name
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}